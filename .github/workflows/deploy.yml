name: Precision Performance CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  supabase-migrations:
    name: Supabase Database Sync & Validation
    runs-on: ubuntu-latest
    # Non-blocking: migration validation runs independently, does not gate Vercel deployment
    continue-on-error: true
    steps:
      - name: Code Repository Checkout
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lint Supabase Migrations (remote)
        run: supabase db lint --project-id ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: true

  vercel-deployment:
    name: Vercel Frontend Deployment
    runs-on: ubuntu-latest
    # No longer dependent on supabase-migrations — Vercel deploys immediately on push
    steps:
      - name: Code Repository Checkout
        uses: actions/checkout@v3

      - name: Vercel Deployment Trigger
        run: echo "Vercel deploys automatically via GitHub integration on 'main' branch push."

  railway-workers:
    name: Railway Background Workers
    runs-on: ubuntu-latest
    steps:
      - name: Code Repository Checkout
        uses: actions/checkout@v3

      - name: Railway Deployment Status
        run: echo "Railway triggers automatically via GitHub integration."
